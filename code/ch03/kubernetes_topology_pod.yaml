apiVersion: v1
kind: Pod
metadata:
  name: gpu-topology-aware-pod
  labels:
    app: distributed-training
spec:
  # Enable host networking for InfiniBand/RDMA access
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  
  # Use topology manager for NUMA awareness
  topologyManager:
    policy: "best-effort"
  
  containers:
  - name: training-container
    image: nvcr.io/nvidia/pytorch:25.09-py3
    command: ["bash", "-c"]
    args:
      - |
        # Bind only when the platform exposes a real GPU NUMA node.
        gpu_bus_id=$(nvidia-smi --query-gpu=pci.bus_id --format=csv,noheader | head -1 | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
        sysfs_bus_id="$gpu_bus_id"
        if [[ "$sysfs_bus_id" == 00000000:* ]]; then
          sysfs_bus_id="${sysfs_bus_id:4}"
        fi
        gpu_numa_node=""
        numa_path="/sys/bus/pci/devices/${sysfs_bus_id}/numa_node"
        if [[ -r "$numa_path" ]]; then
          gpu_numa_node=$(cat "$numa_path")
        fi
        if [[ "$gpu_numa_node" =~ ^[0-9]+$ ]]; then
          exec numactl --cpunodebind="$gpu_numa_node" --membind="$gpu_numa_node" python train.py
        fi
        echo "GPU NUMA node unavailable; running without numactl binding" >&2
        exec python train.py
    
    resources:
      requests:
        nvidia.com/gpu: "4"  # Request 4 GPUs
        cpu: "16"
        memory: "64Gi"
      limits:
        nvidia.com/gpu: "4"
        cpu: "16"
        memory: "64Gi"
    
    env:
    - name: NCCL_SOCKET_IFNAME
      value: "ib0"  # InfiniBand interface
    - name: NCCL_IB_DISABLE
      value: "0"
    - name: NCCL_IB_GID_INDEX
      value: "3"
    - name: NCCL_NET_GDR_LEVEL
      value: "3"
    - name: NCCL_DEBUG
      value: "INFO"
    - name: PYTORCH_ALLOC_CONF
      value: "max_split_size_mb:512"
    - name: NCCL_MNNVL_ENABLE
      value: "1"
    - name: NCCL_NETDEVS_POLICY
      value: "MAX:2"
    
    securityContext:
      privileged: true  # Required for RDMA access
      capabilities:
        add:
        - IPC_LOCK  # Required for pinned memory
    
    volumeMounts:
    - name: shared-memory
      mountPath: /dev/shm
    - name: data-volume
      mountPath: /data
      readOnly: true
    - name: output-volume
      mountPath: /output
  
  volumes:
  - name: shared-memory
    emptyDir:
      medium: Memory
      sizeLimit: "8Gi"
  - name: data-volume
    hostPath:
      path: /data/dataset
      type: Directory
  - name: output-volume
    hostPath:
      path: /output
      type: Directory
  
  # Node affinity to select nodes with NVLink-connected GPUs
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: gpu.nvidia.com/nvlink-domain
            operator: Exists
          - key: gpu.nvidia.com/numa-node-count
            operator: In
            values: ["1", "2"]  # Prefer nodes with 1-2 NUMA nodes
  
  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  
  restartPolicy: Never
