name: Tier-1 Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

jobs:
  tier1:
    name: Run canonical tier-1 suite
    runs-on: ${{ vars.TIER1_RUNNER_LABELS_JSON != '' && fromJSON(vars.TIER1_RUNNER_LABELS_JSON) || fromJSON('["self-hosted","gpu"]') }}
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_latest.txt

      - name: GPU preflight
        run: |
          nvidia-smi
          python - <<'PY'
          import os
          import subprocess
          out = subprocess.check_output(
              [
                  "nvidia-smi",
                  "--query-gpu=name,uuid,memory.total,driver_version",
                  "--format=csv,noheader",
              ],
              text=True,
          )
          print(out)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
              handle.write("## Tier-1 GPU Preflight\n\n")
              handle.write("```text\n")
              handle.write(out)
              handle.write("```\n")
          PY

      - name: Compute run id
        run: |
          echo "RUN_ID=$(date -u +%Y%m%d_%H%M%S)_tier1_nightly_${GITHUB_SHA::8}" >> "$GITHUB_ENV"

      - name: Run canonical tier-1 suite
        run: |
          mkdir -p artifacts/history/tier1
          python -m cli.aisp bench run-tier1 \
            --single-gpu \
            --profile minimal \
            --run-id "${RUN_ID}" \
            --history-root artifacts/history/tier1 | tee /tmp/tier1_run.json

      - name: Summarize tier-1 results
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          run_id = os.environ["RUN_ID"]
          history_root = Path("artifacts/history/tier1")
          run_dir = history_root / run_id
          summary_path = run_dir / "summary.json"
          regression_path = run_dir / "regression_summary.md"
          step_summary = Path(os.environ["GITHUB_STEP_SUMMARY"])

          lines = ["## Tier-1 Suite Result", ""]
          lines.append(f"- Run id: `{run_id}`")
          lines.append(f"- History root: `{history_root}`")
          if summary_path.exists():
              payload = json.loads(summary_path.read_text(encoding="utf-8"))
              summary = payload.get("summary", {})
              lines.append(f"- Targets: `{summary.get('target_count', 0)}`")
              lines.append(f"- Succeeded: `{summary.get('succeeded', 0)}`")
              lines.append(f"- Failed: `{summary.get('failed', 0)}`")
              lines.append(f"- Geomean speedup: `{float(summary.get('geomean_speedup', 0.0)):.3f}x`")
              lines.append(f"- Max speedup: `{float(summary.get('max_speedup', 0.0)):.3f}x`")
          else:
              lines.append("- `summary.json` was not produced.")
          lines.append("")
          if regression_path.exists():
              lines.append("### Regression Summary")
              lines.append("")
              lines.append(regression_path.read_text(encoding="utf-8"))
          step_summary.write_text(step_summary.read_text(encoding="utf-8") + "\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload tier-1 history artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier1-history-${{ env.RUN_ID }}
          path: |
            artifacts/history/tier1/index.json
            artifacts/history/tier1/${{ env.RUN_ID }}/summary.json
            artifacts/history/tier1/${{ env.RUN_ID }}/regression_summary.md
            artifacts/history/tier1/${{ env.RUN_ID }}/regression_summary.json
            artifacts/history/tier1/${{ env.RUN_ID }}/trend_snapshot.json
          if-no-files-found: warn
          retention-days: 30
